<!DOCTYPE html>
<html>

<head>
<title>Tool Room Equipment</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
overflow:hidden;
}

/* APP IFRAME */
iframe{
width:100%;
height:100%;
position:fixed;
top:0;
left:0;
border:none;
z-index:1;
}

/* WATERMARK OVERLAY */
#watermarkLayer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:999999;
overflow:hidden;
}

/* WATERMARK BLOCK */
.watermarkBlock{
position:absolute;
width:240px;
font-size:13px;
line-height:1.5;
font-weight:600;
user-select:none;
}

/* Title */
.wm-title{
font-size:15px;
font-weight:bold;
letter-spacing:1px;
}
  /* BLUR LAYER */
#blurLayer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(8px);
display:none;
justify-content:center;
align-items:center;
z-index:1000000;
}

/* MESSAGE */
#blurMessage{
color:white;
font-size:22px;
font-weight:bold;
text-align:center;
padding:20px;
border:2px solid white;
border-radius:10px;
background:rgba(0,0,0,0.4);
}
</style>

</head>

<body>
  <div id="blurLayer">
  <div id="blurMessage">⚠ Screen Inactive / Protected</div>
</div>

<iframe id="appframe"></iframe>

<!-- WATERMARK -->
<div id="watermarkLayer"></div>

<script>

/* ------------------ PARAMETERS ------------------ */

const params = new URLSearchParams(window.location.search);
const id = params.get("id") || "UNKNOWN";

/* ------------------ SESSION ------------------ */

let sessionId = sessionStorage.getItem("session_id");

if(!sessionId){
sessionId = Math.random().toString(36).substring(2,10);
sessionStorage.setItem("session_id",sessionId);
}

/* ------------------ VISIT ------------------ */

let visitCount = sessionStorage.getItem("visit_count");
visitCount = visitCount ? parseInt(visitCount)+1 : 1;
sessionStorage.setItem("visit_count",visitCount);

/* ------------------ DEVICE ------------------ */

const device = /Mobi|Android/i.test(navigator.userAgent) ? "Mobile" : "Desktop";

/* ------------------ OS ------------------ */

let os="Unknown";

if(navigator.userAgent.includes("Win")) os="Windows";
if(navigator.userAgent.includes("Android")) os="Android";
if(navigator.userAgent.includes("iPhone")) os="iOS";
if(navigator.userAgent.includes("Mac")) os="MacOS";

/* ------------------ BROWSER ------------------ */

const browser = navigator.userAgent;

/* ------------------ LOAD APP ------------------ */

fetch("https://api.ipify.org?format=json")
.then(res=>res.json())
.then(data=>{

const ip=data.ip;

/* LOAD APPS SCRIPT */
const scriptURL =
"https://script.google.com/macros/s/AKfycbwzc2DuTGiEZPwTHM68hUusFAaiEQ16aZtIAFsQx9WVDj8qKlUbvlyxRP5c03UMG2OCTw/exec"
+"?id="+id
+"&session="+sessionId
+"&visit="+visitCount
+"&device="+encodeURIComponent(device)
+"&browser="+encodeURIComponent(browser)
+"&os="+encodeURIComponent(os)
+"&ip="+encodeURIComponent(ip);

document.getElementById("appframe").src = scriptURL;

/* INIT WATERMARK AFTER IP AVAILABLE */
startWatermark(id,sessionId,ip);

});


/* ------------------ WATERMARK FUNCTION ------------------ */

function startWatermark(id,session,ip){

function renderWatermark(){

const layer = document.getElementById("watermarkLayer");
layer.innerHTML = "";

/* TIME */
const now = new Date().toLocaleString();

/* GRID SPACING (IMPORTANT) */
let gapX = 260;
let gapY = 200;

/* MOBILE ADJUSTMENT */
if(window.innerWidth < 600){
  gapX = 180;
  gapY = 140;
}
/* SMALL SHIFT */
const shiftX = Math.random()*30;
const shiftY = Math.random()*30;

for(let x=-200; x<window.innerWidth+200; x+=gapX){
for(let y=-200; y<window.innerHeight+200; y+=gapY){

const wm = document.createElement("div");
wm.className = "watermarkBlock";

/* ROTATION RANDOM */
wm.style.transform = (Math.random() > 0.5)
? "rotate(-25deg)"
: "rotate(15deg)";

/* 🎨 COLOR RANDOMIZATION */
const useRed = Math.random() > 0.5;

if(useRed){
  wm.style.color = `rgba(180,0,0,${0.22 + Math.random()*0.1})`;
}else{
  wm.style.color = `rgba(80,80,80,${0.18 + Math.random()*0.1})`;
}

/* POSITION */
wm.style.left = (x + shiftX) + "px";
wm.style.top = (y + shiftY) + "px";

/* TEXT */
wm.innerHTML = `
<div class="wm-title">CONFIDENTIAL</div>
<div>ID: ${id}</div>
<div>S: ${session}</div>
<div>IP: ${ip}</div>
<div>${now}</div>
`;

layer.appendChild(wm);

}
}

}

/* INITIAL */
renderWatermark();

/* UPDATE EVERY 5 SEC */
setInterval(renderWatermark,5000);

}
  /* TAB SWITCH DETECTION */

let blurLayer = document.getElementById("blurLayer");

/* When tab becomes hidden */
document.addEventListener("visibilitychange", function(){

if(document.hidden){
  blurLayer.style.display = "flex";

  /* 🔴 LOG EVENT */
  google.script.run.logSecurityEvent(id,"TAB_SWITCH",sessionId,ip);

/* 🔥 ADD THIS */
google.script.run.detectSuspiciousActivity(id,sessionId,ip);
}

/* When user comes back */
else{
  blurLayer.style.display = "none";

  /* Optional alert */
  showWarning();
}

});


/* WINDOW BLUR (ALT + TAB, etc.) */
window.addEventListener("blur", function(){
blurLayer.style.display = "flex";
});

window.addEventListener("focus", function(){
blurLayer.style.display = "none";
});


/* WARNING POPUP */
function showWarning(){

const msg = document.createElement("div");

msg.innerText = "⚠ Activity detected";
msg.style.position = "fixed";
msg.style.bottom = "20px";
msg.style.left = "50%";
msg.style.transform = "translateX(-50%)";
msg.style.background = "#d00000";
msg.style.color = "white";
msg.style.padding = "10px 20px";
msg.style.borderRadius = "6px";
msg.style.zIndex = "1000001";

document.body.appendChild(msg);

setTimeout(()=>{msg.remove();},2000);

}

</script>

</body>

</html>
