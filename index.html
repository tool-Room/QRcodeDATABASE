<!DOCTYPE html>
<html>

<head>
<title>Tool Room Equipment</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
overflow:hidden;
}

/* APP IFRAME */
iframe{
width:100%;
height:100%;
position:fixed;
top:0;
left:0;
border:none;
z-index:1;
}

/* WATERMARK OVERLAY */
#watermarkLayer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:9999;
overflow:hidden;
}

/* SINGLE WATERMARK ITEM */
.watermark{
position:absolute;
font-size:14px;
color:rgba(255,0,0,0.15);
transform:rotate(-30deg);
white-space:nowrap;
font-weight:bold;
user-select:none;
}

</style>

</head>

<body>

<iframe id="appframe"></iframe>

<!-- WATERMARK -->
<div id="watermarkLayer"></div>

<script>

/* ------------------ PARAMETERS ------------------ */

const params = new URLSearchParams(window.location.search);
const id = params.get("id") || "UNKNOWN";

/* ------------------ SESSION ------------------ */

let sessionId = sessionStorage.getItem("session_id");

if(!sessionId){
sessionId = Math.random().toString(36).substring(2,10);
sessionStorage.setItem("session_id",sessionId);
}

/* ------------------ VISIT ------------------ */

let visitCount = sessionStorage.getItem("visit_count");
visitCount = visitCount ? parseInt(visitCount)+1 : 1;
sessionStorage.setItem("visit_count",visitCount);

/* ------------------ DEVICE ------------------ */

const device = /Mobi|Android/i.test(navigator.userAgent) ? "Mobile" : "Desktop";

/* ------------------ OS ------------------ */

let os="Unknown";

if(navigator.userAgent.includes("Win")) os="Windows";
if(navigator.userAgent.includes("Android")) os="Android";
if(navigator.userAgent.includes("iPhone")) os="iOS";
if(navigator.userAgent.includes("Mac")) os="MacOS";

/* ------------------ BROWSER ------------------ */

const browser = navigator.userAgent;

/* ------------------ LOAD APP ------------------ */

fetch("https://api.ipify.org?format=json")
.then(res=>res.json())
.then(data=>{

const ip=data.ip;

/* LOAD APPS SCRIPT */
const scriptURL =
"https://script.google.com/macros/s/AKfycbyDofOUCJNG4izMY4DmDHfySt9KqBLofz15m1oFG0bo1qJVo5oBms6i5o_lfOr30DwVtQ/exec"
+"?id="+id
+"&session="+sessionId
+"&visit="+visitCount
+"&device="+encodeURIComponent(device)
+"&browser="+encodeURIComponent(browser)
+"&os="+encodeURIComponent(os)
+"&ip="+encodeURIComponent(ip);

document.getElementById("appframe").src = scriptURL;

/* INIT WATERMARK AFTER IP AVAILABLE */
startWatermark(id,sessionId,ip);

});


/* ------------------ WATERMARK FUNCTION ------------------ */

function startWatermark(id,session,ip){

function renderWatermark(){

const layer = document.getElementById("watermarkLayer");
layer.innerHTML = "";

/* CURRENT TIME */
const now = new Date().toLocaleString();

/* TEXT */
const text = `CONFIDENTIAL | ID:${id} | S:${session} | IP:${ip} | ${now}`;

/* GRID GENERATION */
const gapX = 250;
const gapY = 150;

/* RANDOM SHIFT (ANTI-AI REMOVAL) */
const shiftX = Math.random()*50;
const shiftY = Math.random()*50;

for(let x=-200; x<window.innerWidth+200; x+=gapX){
for(let y=-200; y<window.innerHeight+200; y+=gapY){

const wm = document.createElement("div");
wm.className = "watermark";
wm.style.left = (x + shiftX) + "px";
wm.style.top = (y + shiftY) + "px";
wm.innerText = text;

layer.appendChild(wm);

}
}

}

/* INITIAL */
renderWatermark();

/* UPDATE EVERY 5 SEC */
setInterval(renderWatermark,5000);

}

</script>

</body>

</html>
