<!DOCTYPE html>
<html>

<head>
<title>Tool Room Equipment</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
overflow:hidden;
}

/* APP IFRAME */
iframe{
width:100%;
height:100%;
position:fixed;
top:0;
left:0;
border:none;
z-index:1;
}

/* WATERMARK OVERLAY */
#watermarkLayer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:999999;
overflow:hidden;
}

/* WATERMARK BLOCK */
.watermarkBlock{
position:absolute;
width:240px;
font-size:13px;
line-height:1.5;
font-weight:600;
user-select:none;
}

/* Title */
.wm-title{
font-size:15px;
font-weight:bold;
letter-spacing:1px;
}
 
</style>

</head>

<body>
  
<iframe id="appframe"></iframe>

<!-- WATERMARK -->
<div id="watermarkLayer"></div>

<script>

/* ------------------ PARAMETERS ------------------ */

const params = new URLSearchParams(window.location.search);
const id = params.get("id") || "UNKNOWN";

/* ------------------ SESSION ------------------ */

let sessionId = sessionStorage.getItem("session_id");

if(!sessionId){
sessionId = Math.random().toString(36).substring(2,10);
sessionStorage.setItem("session_id",sessionId);
}

/* ------------------ VISIT ------------------ */

let visitCount = sessionStorage.getItem("visit_count");
visitCount = visitCount ? parseInt(visitCount)+1 : 1;
sessionStorage.setItem("visit_count",visitCount);

/* ------------------ DEVICE ------------------ */

const device = /Mobi|Android/i.test(navigator.userAgent) ? "Mobile" : "Desktop";

/* ------------------ OS ------------------ */

let os="Unknown";

if(navigator.userAgent.includes("Win")) os="Windows";
if(navigator.userAgent.includes("Android")) os="Android";
if(navigator.userAgent.includes("iPhone")) os="iOS";
if(navigator.userAgent.includes("Mac")) os="MacOS";

/* ------------------ BROWSER ------------------ */

const browser = navigator.userAgent;

/* ------------------ LOAD APP ------------------ */

fetch("https://api.ipify.org?format=json")
.then(res=>res.json())
.then(data=>{

const ip=data.ip;
 window.userIP = ip;   // ✅ REQUIRED

/* LOAD APPS SCRIPT */
const scriptURL =
"https://script.google.com/macros/s/AKfycbzZXIMl5n7w_yerBhqvdR2Jsi2HggaPvzfmkpf1wSddjdUgh66eakpXJTyPwjNcrKuB/exec"
+"?id="+id
+"&session="+sessionId
+"&visit="+visitCount
+"&device="+encodeURIComponent(device)
+"&browser="+encodeURIComponent(browser)
+"&os="+encodeURIComponent(os)
+"&ip="+encodeURIComponent(ip);

document.getElementById("appframe").src = scriptURL;

/* INIT WATERMARK AFTER IP AVAILABLE */
startWatermark(id,sessionId,ip);

});


/* ------------------ WATERMARK FUNCTION ------------------ */

function startWatermark(id,session,ip){

function renderWatermark(){

const layer = document.getElementById("watermarkLayer");
layer.innerHTML = "";

/* TIME */
const now = new Date().toLocaleString();

/* GRID SPACING (IMPORTANT) */
let gapX = 260;
let gapY = 200;

/* MOBILE ADJUSTMENT */
if(window.innerWidth < 600){
  gapX = 180;
  gapY = 140;
}
/* SMALL SHIFT */
const shiftX = Math.random()*30;
const shiftY = Math.random()*30;

for(let x=-200; x<window.innerWidth+200; x+=gapX){
for(let y=-200; y<window.innerHeight+200; y+=gapY){

const wm = document.createElement("div");
wm.className = "watermarkBlock";

/* ROTATION RANDOM */
wm.style.transform = (Math.random() > 0.5)
? "rotate(-25deg)"
: "rotate(15deg)";

/* 🎨 COLOR RANDOMIZATION */
const useRed = Math.random() > 0.5;

if(useRed){
  wm.style.color = `rgba(180,0,0,${0.22 + Math.random()*0.1})`;
}else{
  wm.style.color = `rgba(80,80,80,${0.18 + Math.random()*0.1})`;
}

/* POSITION */
wm.style.left = (x + shiftX) + "px";
wm.style.top = (y + shiftY) + "px";

/* TEXT */
wm.innerHTML = `
<div class="wm-title">CONFIDENTIAL</div>
<div>ID: ${id}</div>
<div>S: ${session}</div>
<div>IP: ${ip}</div>
<div>${now}</div>
`;

layer.appendChild(wm);

}
}

}

/* INITIAL */
renderWatermark();

/* UPDATE EVERY 5 SEC */
setInterval(renderWatermark,5000);

}
 /* ---------------- SCREENSHOT DETECTION + LOG ---------------- */

let lastWidth = window.innerWidth;
let lastHeight = window.innerHeight;

window.addEventListener("resize", function(){

  const widthDiff = Math.abs(window.innerWidth - lastWidth);
  const heightDiff = Math.abs(window.innerHeight - lastHeight);

  if(widthDiff > 150 || heightDiff > 150){

    alert("⚠️ Multiple access detected!");

    sendSecurityEvent("SCREENSHOT_ATTEMPT");

  }

  lastWidth = window.innerWidth;
  lastHeight = window.innerHeight;

});


/* SEND EVENT TO APPS SCRIPT */
function sendSecurityEvent(eventType){

  const scriptURL =
  "https://script.google.com/macros/s/AKfycbwEqWtzkk93niQ-5Qza9jhufUzTF9lEI_CBW8QLC-G3AIGhe7QsAQnsJE8qZFkSmKZKHQ/exec"
  + "?id=" + id
  + "&event=" + eventType
  + "&session=" + sessionId
  + "&visit=" + visitCount
  + "&device=" + encodeURIComponent(device)
  + "&browser=" + encodeURIComponent(browser)
  + "&os=" + encodeURIComponent(os)
  + "&ip=" + encodeURIComponent(window.userIP || "");

  fetch(scriptURL);

}
  


</script>

</body>

</html>
