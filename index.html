<!DOCTYPE html>
<html>

<head>
<title>Tool Room Equipment</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy"
content="default-src 'self' https://script.google.com https://accounts.google.com https://*.googleusercontent.com https://api.ipify.org;
script-src 'self' https://api.ipify.org https://accounts.google.com;
frame-src https://script.google.com https://accounts.google.com;
connect-src https://api.ipify.org;">
<style>

body{
margin:0;
overflow:hidden;
}

iframe{
width:100%;
height:100%;
position:fixed;
top:0;
left:0;
border:none;
}

</style>

</head>

<body>

<iframe id="appframe"></iframe>

<script>

/* Read QR parameters */

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

/* Session */

let sessionId = sessionStorage.getItem("session_id");

if(!sessionId){
sessionId = Math.random().toString(36).substring(2,10);
sessionStorage.setItem("session_id",sessionId);
}

/* Visit count */

let visitCount = sessionStorage.getItem("visit_count");
visitCount = visitCount ? parseInt(visitCount)+1 : 1;
sessionStorage.setItem("visit_count",visitCount);

/* Device */

const device = /Mobi|Android/i.test(navigator.userAgent) ? "Mobile" : "Desktop";

/* OS */

let os="Unknown";

if(navigator.userAgent.includes("Win")) os="Windows";
if(navigator.userAgent.includes("Android")) os="Android";
if(navigator.userAgent.includes("iPhone")) os="iOS";
if(navigator.userAgent.includes("Mac")) os="MacOS";

/* Browser */

const browser = navigator.userAgent;

/* Get IP */

fetch("https://api.ipify.org?format=json")
.then(res=>res.json())
.then(data=>{

const ip=data.ip;

const scriptURL =
"https://script.google.com/macros/s/AKfycbz11IGOpxGuLMwZgmtr_k8an-Ci9HfguQ6HOZs4cwoe3q01GdmJ_DJptPzRNMNlwbVz1w/exec"
+"?id="+id
+"&session="+sessionId
+"&visit="+visitCount
+"&device="+encodeURIComponent(device)
+"&browser="+encodeURIComponent(browser)
+"&os="+encodeURIComponent(os)
+"&ip="+encodeURIComponent(ip);

/* CHECK IF USER LOGGED IN */

if(!sessionStorage.getItem("google_auth")){

sessionStorage.setItem("google_auth","1");

/* REDIRECT FOR LOGIN */

window.location.href = scriptURL;

}else{

/* LOAD UI AFTER LOGIN */

document.getElementById("appframe").src = scriptURL;

}

});

</script>

</body>

</html>
