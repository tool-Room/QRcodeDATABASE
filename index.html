<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

/* SESSION ID */

let sessionId = sessionStorage.getItem("session_id");

if(!sessionId){
  sessionId = Math.random().toString(36).substring(2,10);
  sessionStorage.setItem("session_id",sessionId);
}

/* VISIT COUNT */

let visitCount = sessionStorage.getItem("visit_count");
visitCount = visitCount ? parseInt(visitCount)+1 : 1;
sessionStorage.setItem("visit_count",visitCount);

/* DEVICE */

const device = /Mobi|Android/i.test(navigator.userAgent) ? "Mobile" : "Desktop";

/* OS DETECTION */

let os="Unknown";

if(navigator.userAgent.indexOf("Win")!=-1) os="Windows";
if(navigator.userAgent.indexOf("Android")!=-1) os="Android";
if(navigator.userAgent.indexOf("iPhone")!=-1) os="iOS";
if(navigator.userAgent.indexOf("Mac")!=-1) os="MacOS";

/* BROWSER */

const browser = navigator.userAgent;

/* DOCUMENT TRACKING */

let docsAccessed=[];

/* START TIME */

const startTime=Date.now();

/* GET IP */

fetch("https://api.ipify.org?format=json")
.then(res=>res.json())
.then(data=>{

const ip=data.ip;

/* BUILD SCRIPT URL */

const scriptURL =
"https://script.google.com/macros/s/AKfycbyfymlV1FLu50r8TdUqMEWZACu_DHWt6L7-Iq9A3uMGTtUk-ySi59U6qiO4CKDqHAh39Q/exec"
+"?id="+id
+"&session="+sessionId
+"&visit="+visitCount
+"&device="+encodeURIComponent(device)
+"&browser="+encodeURIComponent(browser)
+"&os="+encodeURIComponent(os)
+"&ip="+encodeURIComponent(ip);

/* LOAD APPS SCRIPT PAGE */

document.getElementById("appframe").src=scriptURL;

});

/* RECEIVE DOCUMENT CLICK EVENTS FROM IFRAME */

window.addEventListener("message",function(e){

if(e.data && e.data.doc){

if(!docsAccessed.includes(e.data.doc)){
docsAccessed.push(e.data.doc);
}

}

});

/* SEND DURATION + DOCUMENTS WHEN PAGE CLOSES */

window.addEventListener("beforeunload",function(){

let duration=Math.round((Date.now()-startTime)/1000);

navigator.sendBeacon(
"https://script.google.com/macros/s/AKfycbyfymlV1FLu50r8TdUqMEWZACu_DHWt6L7-Iq9A3uMGTtUk-ySi59U6qiO4CKDqHAh39Q/exec",
new URLSearchParams({
id:id,
session:sessionId,
visit:visitCount,
duration:duration,
docs:docsAccessed.join(", ")
})
);

});

</script>
