<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

/* SESSION */

let sessionId = sessionStorage.getItem("session_id");

if(!sessionId){
sessionId = Math.random().toString(36).substring(2,10);
sessionStorage.setItem("session_id",sessionId);
}

/* VISIT */

let visitCount = sessionStorage.getItem("visit_count");
visitCount = visitCount ? parseInt(visitCount)+1 : 1;
sessionStorage.setItem("visit_count",visitCount);

/* DEVICE */

const device = /Mobi|Android/i.test(navigator.userAgent) ? "Mobile" : "Desktop";

/* OS */

let os="Unknown";

if(navigator.userAgent.includes("Win")) os="Windows";
if(navigator.userAgent.includes("Android")) os="Android";
if(navigator.userAgent.includes("iPhone")) os="iOS";
if(navigator.userAgent.includes("Mac")) os="MacOS";

/* BROWSER */

const browser = navigator.userAgent;

/* DOCUMENT TRACKING */

let docsAccessed=[];

/* SESSION START */

const startTime = Date.now();

/* LISTEN DOCUMENT EVENTS FROM APPS SCRIPT UI */

window.addEventListener("message",function(e){

if(e.data && e.data.doc){

if(!docsAccessed.includes(e.data.doc)){
docsAccessed.push(e.data.doc);
}

}

});

/* GET IP */

fetch("https://api.ipify.org?format=json")
.then(res=>res.json())
.then(data=>{

const ip=data.ip;

const scriptURL =
"https://script.google.com/macros/s/AKfycbyfymlV1FLu50r8TdUqMEWZACu_DHWt6L7-Iq9A3uMGTtUk-ySi59U6qiO4CKDqHAh39Q/exec"
+"?id="+id
+"&session="+sessionId
+"&visit="+visitCount
+"&device="+encodeURIComponent(device)
+"&browser="+encodeURIComponent(browser)
+"&os="+encodeURIComponent(os)
+"&ip="+encodeURIComponent(ip);

document.getElementById("appframe").src = scriptURL;

});

/* WHEN PAGE CLOSES SEND DURATION + DOCUMENTS */

window.addEventListener("beforeunload",function(){

let duration=Math.round((Date.now()-startTime)/1000);

navigator.sendBeacon(
"https://script.google.com/macros/s/AKfycbxR-2o6AB95b_Qi6l2UXVy54LQ1JR6aRxGWrvOx5entGeb8jXSIvprRa2mosQev8ob-AQ/exec",
new URLSearchParams({
id:id,
duration:duration,
docs:docsAccessed.join(", ")
})
);

});

</script>
